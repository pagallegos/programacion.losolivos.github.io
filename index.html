<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>APS ARES</title>

<script src="daypilot-all.min.js"></script>

<style>

html, body{
    margin:0;
    padding:0;
    height:100%;
}

#mi-calendario{
    width:100%;
    height:100vh;
}

</style>

</head>

<body>

<div id="mi-calendario"></div>

<script>

const dp = new DayPilot.Scheduler("mi-calendario", {

    startDate: DayPilot.Date.today().addDays(-1),

   timeline: DayPilot.DateUtil.minutes(
    new DayPilot.Date(fechaInicio + "T08:00:00"),
    7 * 10 * 60,
    1
),

    businessBeginsHour: 8,
    businessEndsHour: 18,

    timeHeaders: [
        {groupBy:"Day", format:"dd/MM/yyyy"},
        {groupBy:"Hour", format:"HH:mm"}
    ],

    resources: [
        {name:"SECCIONADORA", id:"corte"},
        {name:"CANTO 1", id:"canto1"},
        {name:"CANTO 2", id:"canto2"}
    ],

    eventMoveHandling: "Update",
    eventResizeHandling: "Update",

    rowHeaderColumns: [
        {title:"Máquina", width:120}
    ]

});

dp.init();



function normalizarInicio(fecha){

    let f = new DayPilot.Date(fecha);

    if(f.getHours() < 8){

        return new DayPilot.Date(
            f.toString("yyyy-MM-dd") + "T08:00:00"
        );

    }

    if(f.getHours() >= 18){

        f = f.addDays(1);

        return new DayPilot.Date(
            f.toString("yyyy-MM-dd") + "T08:00:00"
        );
    }

    return f;
}



function agregarMinutosLaborales(fechaInicio,minutos){

    let actual = normalizarInicio(fechaInicio);

    while(minutos > 0){

        const minutosActuales =
            actual.getHours()*60 + actual.getMinutes();

        const minutosDisponibles =
            (18*60) - minutosActuales;

        const avanzar =
            Math.min(minutos,minutosDisponibles);

        actual = actual.addMinutes(avanzar);

        minutos -= avanzar;

        if(minutos > 0){

            actual = actual.addDays(1);

            actual = new DayPilot.Date(
                actual.toString("yyyy-MM-dd") + "T08:00:00"
            );
        }
    }

    return actual;
}
function crearSegmentos(fechaInicio,minutos){

    let segmentos = [];

    let inicio = normalizarInicio(fechaInicio);

    while(minutos > 0){

        const finJornada =
            new DayPilot.Date(
                inicio.toString("yyyy-MM-dd")
                + "T18:00:00"
            );

        const minutosDisponibles =
            finJornada.getTime() -
            inicio.getTime();

        const minutosDisponiblesReales =
            minutosDisponibles / 60000;

        const avanzar =
            Math.min(
                minutos,
                minutosDisponiblesReales
            );

        const fin =
            inicio.addMinutes(avanzar);

        segmentos.push({
            inicio:inicio,
            fin:fin
        });

        minutos -= avanzar;

        if(minutos > 0){

            inicio =
                new DayPilot.Date(
                    inicio.addDays(1)
                    .toString("yyyy-MM-dd")
                    + "T08:00:00"
                );
        }
    }

    return segmentos;
}


const api =
"https://script.google.com/macros/s/AKfycbwq4tQjPsz9ahHP5XV4Cqxx1hE91HXT8Fcd2gz_e885-aRlF0zHcXWKx8g1EYR8ckaX/exec";

fetch(api)

.then(r => r.json())

.then(datos => {

    datos.sort((a,b)=>{

        const fa = new Date(
            a.fecha_entrega + " " + a.hora_entrega
        );

        const fb = new Date(
            b.fecha_entrega + " " + b.hora_entrega
        );

        return fa - fb;

    });



    const fechaBase =
    datos[0].fecha_programacion;

let corteDisponible =
    new DayPilot.Date(
        fechaBase.substring(0,10) +
        "T08:00:00"
    );

    let canto1Disponible = corteDisponible;
    let canto2Disponible = corteDisponible;

    let id = 1;



    datos.forEach(p=>{

        const piezas =
            Number(p.piezas) || 0;

        const metrosCanto =
            Number(p.canto) || 0;



        const tiempoSetupCorte = 10;
        const tiempoSetupCanto = 5;



        let tiempoCorte =
            tiempoSetupCorte +
            ((piezas/1700)*600);

        let tiempoCanto =
            tiempoSetupCanto +
            ((metrosCanto/1500)*480);



        tiempoCorte =
            Math.max(tiempoCorte,10);

        tiempoCanto =
            Math.max(tiempoCanto,10);



        // =====================
        // CORTE
        // =====================

        const inicioCorte =
            normalizarInicio(
                corteDisponible
            );

        const finCorte =
            agregarMinutosLaborales(
                inicioCorte,
                tiempoCorte
            );

       const segmentosCorte =
    crearSegmentos(
        inicioCorte,
        tiempoCorte
    );

segmentosCorte.forEach(seg=>{

    dp.events.add({

        id:id++,

        resource:"corte",

        start:seg.inicio,

        end:seg.fin,

        text:
            "LP " + p.lp +
            "\n" +
            piezas + " pzs" +
            "\n" +
            p.cliente,

        backColor:"#2196F3"

    });

});

   corteDisponible =
    segmentosCorte[
        segmentosCorte.length-1
    ].fin;



        // =====================
        // CANTO
        // =====================

        if(metrosCanto > 0){

            let maquina;
            let inicioCanto;

            if(
                canto1Disponible.getTime()
                <=
                canto2Disponible.getTime()
            ){

                maquina = "canto1";

                inicioCanto =
                    (
                        canto1Disponible.getTime()
                        >
                        finCorte.getTime()
                    )
                    ?
                    canto1Disponible
                    :
                    finCorte;

            }
            else{

                maquina = "canto2";

                inicioCanto =
                    (
                        canto2Disponible.getTime()
                        >
                        finCorte.getTime()
                    )
                    ?
                    canto2Disponible
                    :
                    finCorte;

            }

            inicioCanto =
                normalizarInicio(
                    inicioCanto
                );

            const finCanto =
                agregarMinutosLaborales(
                    inicioCanto,
                    tiempoCanto
                );

            const segmentosCanto =
    crearSegmentos(
        inicioCanto,
        tiempoCanto
    );

segmentosCanto.forEach(seg=>{

    dp.events.add({

        id:id++,

        resource:maquina,

        start:seg.inicio,

        end:seg.fin,

        text:
            "LP " + p.lp +
            "\n" +
            metrosCanto + " ml" +
            "\n" +
            p.cliente,

        backColor:
            maquina==="canto1"
            ? "#4CAF50"
            : "#FF9800"

    });

});

            if(maquina === "canto1"){

                canto1Disponible =
    segmentosCanto[
        segmentosCanto.length-1
    ].fin;

            }
            else{

                canto2Disponible =
    segmentosCanto[
        segmentosCanto.length-1
    ].fin;

            }

        }

    });

    dp.update();

})

.catch(error => {

    console.log(error);

});

</script>

</body>
</html>
