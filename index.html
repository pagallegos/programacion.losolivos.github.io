<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>APS ARES</title>

<script src="daypilot-all.min.js"></script>

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
}

#mi-calendario{
    width:100%;
    height:100vh;
}
</style>

</head>
<body>

<div id="mi-calendario"></div>

<script>

const dp = new DayPilot.Scheduler("mi-calendario", {

    startDate: DayPilot.Date.today().addDays(-1),

    days: 7,

    scale: "CellDuration",
    cellDuration: 10,

    businessBeginsHour: 8,
    businessEndsHour: 18,

    timeHeaders: [
        {groupBy:"Day",format:"dd/MM/yyyy"},
        {groupBy:"Hour",format:"HH:mm"}
    ],

    resources: [
        {name:"SECCIONADORA", id:"corte"},
        {name:"CANTO 1", id:"canto1"},
        {name:"CANTO 2", id:"canto2"}
    ],

    eventMoveHandling: "Update",
    eventResizeHandling: "Update"

});

dp.init();

function siguienteHoraLaboral(fecha){

    let f = new DayPilot.Date(fecha);

    if(f.getHours() < 8){
        return new DayPilot.Date(
            f.toString("yyyy-MM-dd") + "T08:00:00"
        );
    }

    if(f.getHours() >= 18){

        f = f.addDays(1);

        return new DayPilot.Date(
            f.toString("yyyy-MM-dd") + "T08:00:00"
        );
    }

    return f;
}

function agregarMinutosLaborales(fechaInicio,minutos){

    let actual = siguienteHoraLaboral(fechaInicio);

    while(minutos > 0){

        const minutosActuales =
            actual.getHours()*60 + actual.getMinutes();

        const minutosDisponibles =
            (18*60) - minutosActuales;

        if(minutosDisponibles <= 0){

            actual = actual.addDays(1);

            actual = new DayPilot.Date(
                actual.toString("yyyy-MM-dd") + "T08:00:00"
            );

            continue;
        }

        const avanzar =
            Math.min(minutos,minutosDisponibles);

        actual = actual.addMinutes(avanzar);

        minutos -= avanzar;

        if(minutos > 0){

            actual = actual.addDays(1);

            actual = new DayPilot.Date(
                actual.toString("yyyy-MM-dd") + "T08:00:00"
            );
        }
    }

    return actual;
}

const api =
"https://script.google.com/macros/s/AKfycbwq4tQjPsz9ahHP5XV4Cqxx1hE91HXT8Fcd2gz_e885-aRlF0zHcXWKx8g1EYR8ckaX/exec";

fetch(api)
.then(r => r.json())
.then(datos => {

    datos.sort((a,b)=>{

        const fa = new Date(
            a.fecha_entrega + " " + a.hora_entrega
        );

        const fb = new Date(
            b.fecha_entrega + " " + b.hora_entrega
        );

        return fa - fb;
    });

    let corteDisponible =
        new DayPilot.Date(
            DayPilot.Date.today().toString("yyyy-MM-dd")
            + "T08:00:00"
        );

    let canto1Disponible = corteDisponible;
    let canto2Disponible = corteDisponible;

    let id = 1;

    datos.forEach(p=>{

        const piezas =
            Number(p.piezas) || 0;

        const metrosCanto =
            Number(p.canto) || 0;

        const tiempoCorte =
            (piezas / 1700) * 600;

        const tiempoCanto =
            (metrosCanto / 1500) * 480;

        //------------------------
        // CORTE
        //------------------------

        const inicioCorte =
            siguienteHoraLaboral(
                corteDisponible
            );

        const finCorte =
            agregarMinutosLaborales(
                inicioCorte,
                tiempoCorte
            );

        dp.events.add({
            id:id++,
            resource:"corte",
            start:inicioCorte,
            end:finCorte,
            text:`LP ${p.lp} - ${p.cliente}`,
            backColor:"#2196F3"
        });

        corteDisponible = finCorte;

        //------------------------
        // CANTO
        //------------------------

        if(metrosCanto > 0){

            let maquina;
            let inicioCanto;

            if(canto1Disponible <= canto2Disponible){

                maquina = "canto1";

                inicioCanto =
                    canto1Disponible > finCorte
                    ? canto1Disponible
                    : finCorte;

            }
            else{

                maquina = "canto2";

                inicioCanto =
                    canto2Disponible > finCorte
                    ? canto2Disponible
                    : finCorte;
            }

            inicioCanto =
                siguienteHoraLaboral(
                    inicioCanto
                );

            const finCanto =
                agregarMinutosLaborales(
                    inicioCanto,
                    tiempoCanto
                );

            dp.events.add({
                id:id++,
                resource:maquina,
                start:inicioCanto,
                end:finCanto,
                text:`LP ${p.lp}`,
                backColor:
                    maquina === "canto1"
                    ? "#4CAF50"
                    : "#FF9800"
            });

            if(maquina === "canto1"){
                canto1Disponible = finCanto;
            }
            else{
                canto2Disponible = finCanto;
            }
        }

    });

    dp.update();

})
.catch(error=>{
    console.log(error);
});

</script>

</body>
</html>
