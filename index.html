<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>APS ARES</title>

<script src="daypilot-all.min.js"></script>

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
}

#mi-calendario{
    width:100%;
    height:100vh;
}
</style>

</head>

<body>

<div id="mi-calendario"></div>

<script>

const dp = new DayPilot.Scheduler("mi-calendario", {

    startDate: "2026-06-22",
  cellWidth: 2,
    const dp = new DayPilot.Scheduler("mi-calendario", {

    startDate: "2026-06-22",

    scale: "CellDuration",
    cellDuration: 1,
    cellWidth: 2,
    days: 7,

    timeHeaders: [
        {groupBy:"Day",format:"dd/MM/yyyy"},
        {groupBy:"Hour",format:"HH:mm"}
    ],

    resources: [
        {name:"SECCIONADORA",id:"corte"},
        {name:"CANTO 1",id:"canto1"},
        {name:"CANTO 2",id:"canto2"},
        {name:"RANURA",id:"ranura"},
        {name:"PERFORADO",id:"perforado"},
        {name:"CHAFLÁN",id:"chaflan"},
        {name:"ESPECIALES",id:"especiales"},
        {name:"CALIDAD",id:"calidad"}
    ]

});

    showNonBusiness: false,
    businessBeginsHour: 8,
    businessEndsHour: 20,

    timeHeaders: [
        {groupBy:"Day",format:"dd/MM/yyyy"},
        {groupBy:"Hour",format:"HH:mm"}
    ],

    resources:[
        {name:"SECCIONADORA",id:"corte"},
        {name:"CANTO 1",id:"canto1"},
        {name:"CANTO 2",id:"canto2"},
        {name:"RANURA",id:"ranura"},
        {name:"PERFORADO",id:"perforado"},
        {name:"CHAFLÁN",id:"chaflan"},
        {name:"ESPECIALES",id:"especiales"},
        {name:"CALIDAD",id:"calidad"}
    ],

    eventMoveHandling:"Update",
    eventResizeHandling:"Update"

});

dp.init();

function normalizarInicio(fecha){

    let f = new DayPilot.Date(fecha);

    if(f.getHours() < 8){
        return new DayPilot.Date(
            f.toString("yyyy-MM-dd") + "T08:00:00"
        );
    }

    if(f.getHours() >= 18){
        return new DayPilot.Date(
            f.addDays(1).toString("yyyy-MM-dd")
            + "T08:00:00"
        );
    }

    return f;
}

function crearSegmentos(fechaInicio,minutos){

    let segmentos = [];
    let inicio = normalizarInicio(fechaInicio);

    while(minutos > 0){

        const finJornada =
            new DayPilot.Date(
                inicio.toString("yyyy-MM-dd")
                + "T18:00:00"
            );

        const disponibles =
            (finJornada.getTime() -
            inicio.getTime()) / 60000;

        const avanzar =
            Math.min(minutos,disponibles);

        if(avanzar <= 0){

            inicio =
                new DayPilot.Date(
                    inicio.addDays(1)
                    .toString("yyyy-MM-dd")
                    + "T08:00:00"
                );

            continue;
        }

        const fin =
            inicio.addMinutes(avanzar);

        segmentos.push({
            inicio:inicio,
            fin:fin
        });

        minutos -= avanzar;

        if(minutos > 0){

            inicio =
                new DayPilot.Date(
                    inicio.addDays(1)
                    .toString("yyyy-MM-dd")
                    + "T08:00:00"
                );
        }
    }

    return segmentos;
}

const api =
"https://script.google.com/macros/s/AKfycbwq4tQjPsz9ahHP5XV4Cqxx1hE91HXT8Fcd2gz_e885-aRlF0zHcXWKx8g1EYR8ckaX/exec";

fetch(api)

.then(r=>r.json())

.then(datos=>{

    if(datos.length===0) return;

    const fechaBase =
        datos[0].fecha_programacion ||
        "2026-06-22";

    dp.startDate = new DayPilot.Date(
    fechaBase + "T08:00:00"
        
);
    dp.update();

    let corteDisponible =
        new DayPilot.Date(
            fechaBase + "T08:00:00"
        );

    let canto1Disponible =
        new DayPilot.Date(
            fechaBase + "T08:00:00"
        );

    let canto2Disponible =
        new DayPilot.Date(
            fechaBase + "T08:00:00"
        );

    let id = 1;

    datos.forEach(p=>{

        const piezas =
            Number(p.piezas) || 0;

        const metrosCanto =
            Number(p.canto) || 0;

        let tiempoCorte =
            Math.ceil(
                10 +
                ((piezas/1700)*600)
            );

        let tiempoCanto =
            Math.ceil(
                5 +
                ((metrosCanto/1500)*480)
            );

        // no mostrar cortes menores a 5 minutos
        if(tiempoCorte < 5){
            tiempoCorte = 0;
        }

        // ==================
        // CORTE
        // ==================

        let finCorte = corteDisponible;

        if(tiempoCorte > 0){

            const segmentosCorte =
                crearSegmentos(
                    corteDisponible,
                    tiempoCorte
                );

            segmentosCorte.forEach(seg=>{

                dp.events.add({

                    id:id++,

                    resource:"corte",

                    start:seg.inicio,

                    end:seg.fin,

                    text:
                        
                        + p.lp
                        + " | "
                        + piezas
                        + " pzs | "
                        + p.cliente,

                    backColor:"#2196F3"

                });

            });

            finCorte =
                segmentosCorte[
                    segmentosCorte.length-1
                ].fin;

            corteDisponible = finCorte;
        }

        // ==================
        // CANTO
        // ==================

        if(metrosCanto > 0){

            let maquina;
            let disponible;

            if(
                canto1Disponible.getTime()
                <=
                canto2Disponible.getTime()
            ){

                maquina="canto1";
                disponible=canto1Disponible;

            }else{

                maquina="canto2";
                disponible=canto2Disponible;
            }

            let inicioCanto =
                disponible.getTime() >
                finCorte.getTime()
                ?
                disponible
                :
                finCorte;

            const segmentosCanto =
                crearSegmentos(
                    inicioCanto,
                    tiempoCanto
                );

            segmentosCanto.forEach(seg=>{

                dp.events.add({

                    id:id++,

                    resource:maquina,

                    start:seg.inicio,

                    end:seg.fin,

                    text:
                        
                        + p.lp
                        + " | "
                        + metrosCanto
                        + " ml | "
                        + p.cliente,

                    backColor:
                        maquina==="canto1"
                        ?
                        "#4CAF50"
                        :
                        "#FF9800"

                });

            });

            const finCanto =
                segmentosCanto[
                    segmentosCanto.length-1
                ].fin;

            if(maquina==="canto1"){
                canto1Disponible = finCanto;
            }else{
                canto2Disponible = finCanto;
            }
        }

    });

    dp.update();

    dp.scrollTo(
        fechaBase + "T08:00:00"
    );

})

.catch(error=>{

    console.log(error);

});

</script>

</body>
</html>
