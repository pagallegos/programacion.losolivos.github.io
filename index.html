<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>APS ARES</title>

    <script src="daypilot-all.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #mi-calendario {
            height: 100vh;
        }
    </style>
</head>

<body>

<div id="mi-calendario"></div>

<script>

const dp = new DayPilot.Calendar("mi-calendario", {

    viewType: "Days",
    days: 7,

    startDate: DayPilot.Date.today().addDays(-1),

    businessBeginsHour: 8,
    businessEndsHour: 18,

    cellHeight: 25,

    eventMoveHandling: "Update",
    eventResizeHandling: "Update",

    events: []

});

dp.init();

function agregarMinutosLaborales(fechaInicio, minutos) {

    let actual = new DayPilot.Date(fechaInicio);

    while (minutos > 0) {

        let hora = actual.getHours();
        let minuto = actual.getMinutes();

        // Antes de iniciar jornada
        if (hora < 8) {
            actual = new DayPilot.Date(
                actual.toString("yyyy-MM-dd") + "T08:00:00"
            );
            hora = 8;
            minuto = 0;
        }

        // Después del fin de jornada
        if (hora >= 18) {
            actual = actual.addDays(1);
            actual = new DayPilot.Date(
                actual.toString("yyyy-MM-dd") + "T08:00:00"
            );
            continue;
        }

        const minutosActuales = hora * 60 + minuto;
        const minutosFinJornada = 18 * 60;

        const disponiblesHoy =
            minutosFinJornada - minutosActuales;

        const avanzar = Math.min(disponiblesHoy, minutos);

        actual = actual.addMinutes(avanzar);

        minutos -= avanzar;

        if (minutos > 0 && actual.getHours() >= 18) {

            actual = actual.addDays(1);

            actual = new DayPilot.Date(
                actual.toString("yyyy-MM-dd") + "T08:00:00"
            );
        }
    }

    return actual;
}

const api =
"https://script.google.com/macros/s/AKfycbwq4tQjPsz9ahHP5XV4Cqxx1hE91HXT8Fcd2gz_e885-aRlF0zHcXWKx8g1EYR8ckaX/exec";

fetch(api)
.then(r => r.json())
.then(datos => {

    // Ordenar por fecha de entrega y hora de entrega
    datos.sort((a,b) => {

        const fechaA = new Date(a.fecha_entrega + " " + a.hora_entrega);
        const fechaB = new Date(b.fecha_entrega + " " + b.hora_entrega);

        return fechaA - fechaB;
    });

    let corteActual = new DayPilot.Date(
        DayPilot.Date.today().toString("yyyy-MM-dd") + "T08:00:00"
    );

    let canto1Actual = corteActual;
    let canto2Actual = corteActual;

    let id = 1;

    datos.forEach(p => {

        const piezas = Number(p.piezas) || 0;
        const canto = Number(p.canto) || 0;

        // 1700 piezas en 600 minutos
        const tiempoCorte = (piezas / 1700) * 600;

        // 1500 metros en 480 minutos
        const tiempoCanto = (canto / 1500) * 480;

        // -------- CORTE ---------

        const inicioCorte = corteActual;

        const finCorte = agregarMinutosLaborales(
            inicioCorte,
            tiempoCorte
        );

        dp.events.add({
            id: id++,
            start: inicioCorte,
            end: finCorte,
            text: `CORTE LP ${p.lp} - ${p.cliente}`,
            backColor: "#2196F3"
        });

        corteActual = finCorte;

        // -------- CANTO ---------

        let inicioCanto;

        if (canto1Actual <= canto2Actual) {

            inicioCanto =
                canto1Actual > finCorte
                ? canto1Actual
                : finCorte;

            const finCanto = agregarMinutosLaborales(
                inicioCanto,
                tiempoCanto
            );

            dp.events.add({
                id: id++,
                start: inicioCanto,
                end: finCanto,
                text: `CANTO 1 LP ${p.lp}`,
                backColor: "#4CAF50"
            });

            canto1Actual = finCanto;

        }
        else {

            inicioCanto =
                canto2Actual > finCorte
                ? canto2Actual
                : finCorte;

            const finCanto = agregarMinutosLaborales(
                inicioCanto,
                tiempoCanto
            );

            dp.events.add({
                id: id++,
                start: inicioCanto,
                end: finCanto,
                text: `CANTO 2 LP ${p.lp}`,
                backColor: "#FF9800"
            });

            canto2Actual = finCanto;
        }

    });

    dp.update();

})
.catch(error => {

    console.log(error);

});

</script>

</body>
</html>
